name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ─────────────────────────────────────────────────────────────────────────
  # Frontend: TypeScript compile + Vite build
  # ─────────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — type-check & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: frontend
        run: npm install --no-audit --no-fund

      - name: TypeScript compile + Vite build
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:8000
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder_anon_key
        run: npm run build

  # ─────────────────────────────────────────────────────────────────────────
  # Backend: ruff lint + pytest
  # ─────────────────────────────────────────────────────────────────────────
  backend:
    name: Backend — lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies + tools
        working-directory: backend
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint (ruff)
        working-directory: backend
        run: ruff check app/ --output-format=github

      - name: Test (pytest)
        working-directory: backend
        run: |
          if [ -d tests ]; then
            pytest tests/ -v --tb=short
          else
            echo "::warning::No tests/ directory in backend — add pytest tests to backend/tests/"
          fi

  # ─────────────────────────────────────────────────────────────────────────
  # Worker: ruff lint + pytest
  # ─────────────────────────────────────────────────────────────────────────
  worker:
    name: Worker — lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: worker/requirements.txt

      - name: Install dependencies + tools
        working-directory: worker
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint (ruff)
        working-directory: worker
        run: ruff check app/ --output-format=github

      - name: Test (pytest)
        working-directory: worker
        run: |
          if [ -d tests ]; then
            pytest tests/ -v --tb=short
          else
            echo "::warning::No tests/ directory in worker — add pytest tests to worker/tests/"
          fi

  # ─────────────────────────────────────────────────────────────────────────
  # Docker builds — validate Dockerfiles (no push on PRs/branches)
  # ─────────────────────────────────────────────────────────────────────────
  docker-backend:
    name: Docker — build backend
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: neuroarchive/backend:ci

  docker-worker:
    name: Docker — build worker
    runs-on: ubuntu-latest
    needs: worker
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v3
      - name: Build worker image
        uses: docker/build-push-action@v6
        with:
          context: ./worker
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: neuroarchive/worker:ci

  docker-frontend:
    name: Docker — build frontend
    runs-on: ubuntu-latest
    needs: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v3
      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          # No VITE_* build-args: config is injected at container start now,
          # not at build time — see docker-entrypoint.d/40-env-config.sh.
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: neuroarchive/frontend:ci
