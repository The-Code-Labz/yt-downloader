server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed assets aggressively
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Don't cache HTML
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # env-config.js is regenerated per-deployment by docker-entrypoint.d — never cache it
    # (origin, browser, or Cloudflare's default extension-based edge cache), or a redeploy
    # with a corrected VITE_API_URL/etc. silently keeps serving the old values.
    location = /env-config.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
        expires -1;
    }
}
