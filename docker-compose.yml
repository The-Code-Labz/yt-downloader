name: neuroarchive

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    image: ghcr.io/the-code-labz/yt-downloader/backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.neuroarchive-api.rule=Host(`api.archive.example.com`)"
      - "traefik.http.routers.neuroarchive-api.entrypoints=websecure"
      - "traefik.http.routers.neuroarchive-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.neuroarchive-api.loadbalancer.server.port=8000"

  worker:
    image: ghcr.io/the-code-labz/yt-downloader/worker:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      TEMP_DIR: /tmp/neuroarchive
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - worker-tmp:/tmp/neuroarchive
    deploy:
      replicas: 1     # scale this up for parallel downloads

  frontend:
    image: ghcr.io/the-code-labz/yt-downloader/frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      # Read at container start by docker-entrypoint.d/40-env-config.sh,
      # NOT baked in at image build time — same image works for any deployment.
      VITE_API_URL:          ${VITE_API_URL:-http://localhost:8000}
      VITE_SUPABASE_URL:     ${VITE_SUPABASE_URL}
      VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
    ports:
      - "5173:80"
    depends_on:
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.neuroarchive-web.rule=Host(`archive.example.com`)"
      - "traefik.http.routers.neuroarchive-web.entrypoints=websecure"
      - "traefik.http.routers.neuroarchive-web.tls.certresolver=letsencrypt"
      - "traefik.http.services.neuroarchive-web.loadbalancer.server.port=80"

volumes:
  redis-data:
  worker-tmp:
