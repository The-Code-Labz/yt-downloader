name: neuroarchive

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    image: ghcr.io/the-code-labz/yt-downloader/backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      # Shared with the worker below — lets scripts/refresh_cookies.py push a
      # fresh cookies.txt via `PUT /admin/cookies` (requires ADMIN_SECRET set
      # in .env) without ever touching this host or redeploying.
      - cookies-data:/data/cookies
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.neuroarchive-api.rule=Host(`api.archive.example.com`)"
      - "traefik.http.routers.neuroarchive-api.entrypoints=websecure"
      - "traefik.http.routers.neuroarchive-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.neuroarchive-api.loadbalancer.server.port=8000"

  worker:
    image: ghcr.io/the-code-labz/yt-downloader/worker:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      TEMP_DIR: /tmp/neuroarchive
      # Option A — dynamic (recommended): fed by scripts/refresh_cookies.py
      # via the backend's /admin/cookies endpoint, no restart needed on refresh.
      YTDLP_COOKIES_FILE: /data/cookies/cookies.txt
      # Option B — static manual export instead: comment the line above,
      # uncomment this one + the bind-mount below (see README § YouTube bot-check).
      # YTDLP_COOKIES_FILE: /app/cookies.txt
      # SOCKS5/HTTP proxy for yt-dlp's egress — e.g. a tunnel back to a
      # residential/home network with better YouTube IP standing than this
      # host. See README § Bypass via a home-network proxy. Leave unset for
      # direct egress.
      # YTDLP_PROXY: socks5://user:pass@100.x.y.z:1080
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - worker-tmp:/tmp/neuroarchive
      - cookies-data:/data/cookies:ro
      # Option B (static manual export) — see the env var note above.
      # - ./cookies.txt:/app/cookies.txt:ro
    deploy:
      replicas: 1     # scale this up for parallel downloads

  frontend:
    image: ghcr.io/the-code-labz/yt-downloader/frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      # Read at container start by docker-entrypoint.d/40-env-config.sh,
      # NOT baked in at image build time — same image works for any deployment.
      VITE_API_URL:          ${VITE_API_URL:-http://localhost:8000}
      VITE_SUPABASE_URL:     ${VITE_SUPABASE_URL}
      VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
    ports:
      - "5173:80"
    depends_on:
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.neuroarchive-web.rule=Host(`archive.example.com`)"
      - "traefik.http.routers.neuroarchive-web.entrypoints=websecure"
      - "traefik.http.routers.neuroarchive-web.tls.certresolver=letsencrypt"
      - "traefik.http.services.neuroarchive-web.loadbalancer.server.port=80"

volumes:
  redis-data:
  worker-tmp:
  cookies-data:
